<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Emerald</title>
    <link rel="stylesheet" href="csss/styles.css">
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
<div class="auth-card">
    <img src="logo.jpg" class="logo" alt="Emerald logo" />

    <p class="auth-eyebrow">Emerald Learning Centre</p>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Enter to continue your IELTS practice.</p>

    <div class="auth-form">
        <input type="text" id="nameInput" placeholder="Your Name" />

        <div class="password-wrapper">
            <input 
  type="text" 
  id="codeInput" 
  placeholder="Enter access code"
  autocomplete="one-time-code"
  autocorrect="off"
  autocapitalize="none"
  spellcheck="false"
/>
            <i id="togglePassword" class="fa-solid fa-eye toggle-password"></i>
        </div>

        <div class="auth-row">
            <label class="auth-check">
                <input type="checkbox" id="showPasswordCheck">
                <span>Show password</span>
            </label>

            <a href="#" id="forgotPasswordLink" class="auth-inline-link">Forgot password?</a>
        </div>

        <p id="errorText" class="error"></p>

        <button id="loginBtn">Login</button>

        <button id="createAccountBtn" class="auth-secondary-btn" type="button">
            Create Account
        </button>

        <p class="auth-switch-text">
            Don't have an account?
            <span class="auth-inline-note">Ask your teacher or admin to create one for you.</span>
            <span class="auth-inline-note">This is a circuit design (CD) simulation platform. No real user data is collected or stored.</span>
        </p>

    </div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="jss/core.js"></script>
<script src="jss/firebase-init.js"></script>
<script src="jss/emerald-tracker.js"></script>
<script src="jss/emerald-firestore-store.js"></script>
<script src="jss/emerald-firebase-bridge.js"></script>
<script src="jss/auth-config.js"></script>
<script src="jss/auth.js"></script>

</body>
</html>
